backend:
  name: git-gateway
  branch: main

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "galeria"
    label: "Galería de trabajos"
    folder: "content/galeria"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Título de la foto", name: "titulo", widget: "string" }
      - { label: "Imagen", name: "imagen", widget: "image" }
  - name: "galeria_nosotros"
    label: "Galería 'Sobre Nosotros'"
    folder: "content/galeria-nosotros"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Nombre", name: "nombre", widget: "string" }
      - { label: "Imagen", name: "imagen", widget: "image" }
  - name: "servicios"
    label: "Servicios"
    folder: "content/servicios"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Emoji/Ícono", name: "icono", widget: "string" }
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Texto descriptivo", name: "texto", widget: "text" }
  - name: "resenas"
    label: "Reseñas de clientes"
    folder: "content/resenas"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Nombre del cliente", name: "nombre", widget: "string" }
      - { label: "Ciudad", name: "ciudad", widget: "string" }
      - label: "Calificación"
        name: "calificacion"
        widget: "select"
        options: ["1", "2", "3", "4", "5"]
      - { label: "Comentario", name: "comentario", widget: "text" }
  - name: "configuracion"
    label: "Configuración del sitio"
    files:
      - name: "hero"
        label: "Sección principal (Hero)"
        file: "content/hero.json"
        fields:
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Subtítulo", name: "subtitulo", widget: "string" }
          - { label: "Imagen de fondo", name: "imagen", widget: "image" }
      - name: "sobre_nosotros"
        label: "Sección Sobre Nosotros"
        file: "content/sobre-nosotros.json"
        fields:
          - { label: "Texto descriptivo", name: "texto", widget: "text" }
      - name: "elegirnos"
        label: "Sección Por Qué Elegirnos"
        file: "content/elegirnos.json"
        fields:
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Texto", name: "texto", widget: "text" }
          - label: "Lista de checks"
            name: "checks"
            widget: "list"
            field: { label: "Ítem", name: "item", widget: "string" }