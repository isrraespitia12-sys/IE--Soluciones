<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reseñas Pendientes | IE Soluciones</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .resena { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .resena h3 { margin: 0 0 8px 0; }
        button { background-color: #f2994a; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Reseñas pendientes</h1>
    <div id="contenido">Cargando...</div>

    <script>
        netlifyIdentity.on('init', user => {
            if (!user) {
                document.getElementById('contenido').textContent = 'Debés iniciar sesión para ver esta página.';
                netlifyIdentity.open('login');
            } else {
                cargarPendientes();
            }
        });
        netlifyIdentity.init();

        async function cargarPendientes() {
            const contenedor = document.getElementById('contenido');
            const respuesta = await fetch('/.netlify/identity/user');
            contenedor.textContent = 'Función en construcción: acá van a aparecer las reseñas pendientes de Netlify Forms.';
        }
    </script>
</body>
</html>
